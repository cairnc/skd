name: Build & Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            name: macos-arm64
            skia_args: 'is_debug=false skia_use_gl=true skia_use_metal=true'
          - os: ubuntu-22.04
            name: linux-x64
            skia_args: 'is_debug=false skia_use_gl=true'
          - os: windows-2022
            name: windows-x64
            skia_args: 'is_debug=false skia_use_gl=true'

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl-dev libx11-dev libxrandr-dev libxinerama-dev \
            libxcursor-dev libxi-dev libxext-dev libxss-dev libxtst-dev \
            libwayland-dev libxkbcommon-dev libdecor-0-dev \
            libdbus-1-dev libibus-1.0-dev libpipewire-0.3-dev \
            libfontconfig1-dev libfreetype-dev \
            ninja-build python3

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: brew install ninja

      - name: Install Windows dependencies
        if: runner.os == 'Windows'
        run: choco install ninja -y

      - name: Cache Skia build
        id: skia-cache
        uses: actions/cache@v4
        with:
          path: third_party/skia/out/Release
          key: skia-${{ matrix.name }}-${{ hashFiles('.gitmodules', 'third_party/skia/BUILD.gn') }}

      - name: Sync Skia dependencies
        if: steps.skia-cache.outputs.cache-hit != 'true'
        working-directory: third_party/skia
        run: python3 tools/git-sync-deps

      - name: Fetch gn
        if: steps.skia-cache.outputs.cache-hit != 'true'
        working-directory: third_party/skia
        run: python3 bin/fetch-gn

      - name: Generate Skia build files
        if: steps.skia-cache.outputs.cache-hit != 'true'
        working-directory: third_party/skia
        run: bin/gn gen out/Release --args='${{ matrix.skia_args }}'

      - name: Build Skia
        if: steps.skia-cache.outputs.cache-hit != 'true'
        working-directory: third_party/skia
        run: ninja -C out/Release skia

      - name: Setup MSVC
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure skpviz
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -G Ninja

      - name: Build skpviz
        run: cmake --build build --config Release

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp build/skpviz dist/
          tar czf skpviz-${{ matrix.name }}.tar.gz -C dist .

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item build/Release/skpviz.exe dist/ -ErrorAction SilentlyContinue
          Copy-Item build/skpviz.exe dist/ -ErrorAction SilentlyContinue
          Compress-Archive -Path dist/* -DestinationPath skpviz-${{ matrix.name }}.zip

      - name: Attest build provenance (Unix)
        if: runner.os != 'Windows' && startsWith(github.ref, 'refs/tags/')
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: skpviz-${{ matrix.name }}.tar.gz

      - name: Attest build provenance (Windows)
        if: runner.os == 'Windows' && startsWith(github.ref, 'refs/tags/')
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: skpviz-${{ matrix.name }}.zip

      - name: Upload artifact (Unix)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: skpviz-${{ matrix.name }}
          path: skpviz-${{ matrix.name }}.tar.gz

      - name: Upload artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: skpviz-${{ matrix.name }}
          path: skpviz-${{ matrix.name }}.zip

  release:
    needs: build
    if: always() && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*.tar.gz
            artifacts/*.zip
