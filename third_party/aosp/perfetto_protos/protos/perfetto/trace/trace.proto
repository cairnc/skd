// Minimal perfetto Trace + TracePacket envelope — just enough to extract
// the SurfaceFlinger transaction/layer data sources from a .pftrace file.
// All other fields on TracePacket are skipped as unknown during decode.
syntax = "proto2";
package perfetto.protos;

import "protos/perfetto/trace/android/surfaceflinger_layers.proto";
import "protos/perfetto/trace/android/surfaceflinger_transactions.proto";

message TracePacket {
  optional uint64 timestamp = 8;
  // Field numbers match perfetto/trace/trace_packet.proto.
  optional LayersSnapshotProto surfaceflinger_layers_snapshot = 93;
  optional TransactionTraceEntry surfaceflinger_transactions = 94;
}

message Trace {
  repeated TracePacket packet = 1;
}
